<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}} — Protected</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22bg%22%20x1%3D%220%25%22%20y1%3D%220%25%22%20x2%3D%22100%25%22%20y2%3D%22100%25%22%3E%3Cstop%20offset%3D%220%25%22%20style%3D%22stop-color%3A%236366f1%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20style%3D%22stop-color%3A%238b5cf6%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%2296%22%20fill%3D%22url(%23bg)%22%2F%3E%3Cpolyline%20points%3D%2280%2C280%20160%2C280%20200%2C280%20230%2C160%20270%2C380%20310%2C220%20340%2C280%20360%2C280%20432%2C280%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%2236%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3Ccircle%20cx%3D%22432%22%20cy%3D%22280%22%20r%3D%2222%22%20fill%3D%22%23ffffff%22%2F%3E%3C%2Fsvg%3E">
    <style>
        /* Same dark theme: bg #0f1117, text #e4e6eb, accent #4f8cff */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e4e6eb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #161821; border: 1px solid #2a2d37; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
        h1 { font-size: 20px; margin-bottom: 8px; }
        p { color: #8b8d94; font-size: 14px; margin-bottom: 24px; }
        .error { color: #f87171; font-size: 13px; margin-bottom: 16px; }
        input[type="password"] { width: 100%; padding: 10px 14px; border: 1px solid #2a2d37; border-radius: 8px; background: #0f1117; color: #e4e6eb; font-size: 14px; margin-bottom: 16px; outline: none; }
        input[type="password"]:focus { border-color: #4f8cff; }
        button { width: 100%; padding: 10px; background: #4f8cff; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:hover { background: #3a7bff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{.Name}}</h1>
        <p>This status page is password protected.</p>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" autofocus required>
            <button type="submit">View Status</button>
        </form>
    </div>
</body>
</html>
